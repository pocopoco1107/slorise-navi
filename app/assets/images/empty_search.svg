<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <!-- Magnifying glass -->
  <circle cx="90" cy="75" r="35" stroke="#94a3b8" stroke-width="4" fill="#f1f5f9"/>
  <circle cx="90" cy="75" r="28" stroke="#cbd5e1" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <!-- Handle -->
  <line x1="116" y1="101" x2="145" y2="130" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <!-- Question mark inside lens -->
  <text x="90" y="85" text-anchor="middle" font-size="32" font-weight="bold" fill="#94a3b8" font-family="sans-serif">?</text>
  <!-- Floating dots (no results) -->
  <circle cx="45" cy="55" r="3" fill="#cbd5e1" opacity="0.5"/>
  <circle cx="140" cy="50" r="2.5" fill="#cbd5e1" opacity="0.4"/>
  <circle cx="155" cy="80" r="2" fill="#cbd5e1" opacity="0.3"/>
  <circle cx="35" cy="90" r="2" fill="#cbd5e1" opacity="0.4"/>
  <!-- Small lines suggesting empty list -->
  <rect x="60" y="145" width="80" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="70" y="155" width="60" height="4" rx="2" fill="#e2e8f0" opacity="0.6"/>
  <rect x="80" y="165" width="40" height="4" rx="2" fill="#e2e8f0" opacity="0.3"/>
</svg>
