<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Face circle -->
  <circle cx="100" cy="95" r="60" fill="#fef2f2" stroke="#fca5a5" stroke-width="3"/>
  <!-- Left eye (X shape) -->
  <line x1="72" y1="75" x2="82" y2="85" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="75" x2="72" y2="85" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <!-- Right eye (X shape) -->
  <line x1="118" y1="75" x2="128" y2="85" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="75" x2="118" y2="85" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <!-- Wavy mouth (困り顔) -->
  <path d="M 75 115 Q 85 108, 95 115 Q 105 122, 115 115 Q 125 108, 130 112" stroke="#ef4444" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Sweat drop -->
  <path d="M 148 60 Q 152 50, 155 60 Q 155 66, 148 66 Q 145 66, 148 60 Z" fill="#93c5fd" opacity="0.7"/>
  <!-- Floating particles -->
  <circle cx="35" cy="50" r="3" fill="#fca5a5" opacity="0.4"/>
  <circle cx="165" cy="45" r="2.5" fill="#fca5a5" opacity="0.3"/>
  <circle cx="30" cy="130" r="2" fill="#fca5a5" opacity="0.3"/>
  <circle cx="170" cy="135" r="3" fill="#fca5a5" opacity="0.4"/>
  <!-- Exclamation marks -->
  <text x="45" y="80" font-size="16" fill="#fca5a5" font-family="sans-serif" opacity="0.5" font-weight="bold">!</text>
  <text x="155" y="100" font-size="14" fill="#fca5a5" font-family="sans-serif" opacity="0.4" font-weight="bold">!</text>
</svg>
