<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <!-- Slot machine body -->
  <rect x="40" y="40" width="120" height="120" rx="12" fill="#1e3a5f" stroke="#2563eb" stroke-width="2"/>
  <!-- Top cap -->
  <rect x="35" y="32" width="130" height="16" rx="8" fill="#2563eb"/>
  <!-- Screen area -->
  <rect x="55" y="62" width="90" height="50" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Reel dividers -->
  <line x1="85" y1="62" x2="85" y2="112" stroke="#1e40af" stroke-width="1"/>
  <line x1="115" y1="62" x2="115" y2="112" stroke="#1e40af" stroke-width="1"/>
  <!-- Reel symbols: 7 7 7 -->
  <text x="70" y="94" text-anchor="middle" font-size="24" font-weight="bold" fill="#ef4444" font-family="sans-serif">7</text>
  <text x="100" y="94" text-anchor="middle" font-size="24" font-weight="bold" fill="#ef4444" font-family="sans-serif">7</text>
  <text x="130" y="94" text-anchor="middle" font-size="24" font-weight="bold" fill="#ef4444" font-family="sans-serif">7</text>
  <!-- Win line -->
  <line x1="55" y1="87" x2="145" y2="87" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 2" opacity="0.7"/>
  <!-- Lever -->
  <rect x="162" y="70" width="8" height="40" rx="4" fill="#f59e0b"/>
  <circle cx="166" cy="65" r="8" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <!-- Buttons row -->
  <circle cx="70" cy="130" r="7" fill="#10b981" opacity="0.9"/>
  <circle cx="92" cy="130" r="7" fill="#3b82f6" opacity="0.9"/>
  <circle cx="114" cy="130" r="7" fill="#f59e0b" opacity="0.9"/>
  <!-- Coin tray -->
  <rect x="55" y="145" width="90" height="10" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <!-- Sparkle effects -->
  <circle cx="48" cy="50" r="3" fill="#fbbf24" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="48" r="2.5" fill="#fbbf24" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="28" r="2" fill="#fbbf24" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Coins flying -->
  <circle cx="30" cy="155" r="5" fill="#f59e0b" stroke="#d97706" stroke-width="1" opacity="0.7"/>
  <circle cx="170" cy="160" r="4" fill="#f59e0b" stroke="#d97706" stroke-width="1" opacity="0.5"/>
  <circle cx="25" cy="140" r="3" fill="#f59e0b" stroke="#d97706" stroke-width="0.8" opacity="0.4"/>
</svg>
