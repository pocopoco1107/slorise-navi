# Solid Queue recurring tasks
# ⚠️ 現在 Solid Queue は無効 (gem コメントアウト、adapter: :async)
# ⚠️ 本番スケジュールは render.yaml の cron jobs で管理
# ⚠️ Solid Queue を有効化する場合: Gemfile で gem "solid_queue" を有効化 +
#     production.rb で config.active_job.queue_adapter = :solid_queue +
#     puma.rb の SOLID_QUEUE_IN_PUMA 環境変数を設定
#
# Schedule is in UTC (JST = UTC + 9)
# このファイルは Solid Queue 有効化時のリファレンス用

production:
  # DMMぱちタウン: 機種マスタ + 全店設置機種同期 — 03:00 JST (18:00 UTC前日)
  # ※毎月1日はスキップ（月次ジョブが代わりに実行）
  daily_machine_refresh:
    class: DailyMachineRefreshJob
    schedule: at 6pm every day

  # ランキング集計 — 04:00 JST
  ranking_refresh:
    command: "VoterRanking.refresh_weekly!; VoterRanking.refresh_monthly!; VoterRanking.refresh_all_time!"
    schedule: at 7pm every day

  # 収支集計キャッシュ — 04:30 JST
  play_record_summary_refresh:
    command: "PlayRecordSummary.refresh_all!"
    schedule: at 7:30pm every day

  # VoterProfile — 05:00 JST
  voter_profile_refresh:
    command: "Vote.where(voted_on: 7.days.ago..Date.current).select(:voter_token).distinct.pluck(:voter_token).each { |t| VoterProfile.refresh_for(t) }"
    schedule: at 8pm every day

  # DMMぱちタウン: 店舗+機種+詳細フル同期 — 毎月1日 03:00 JST
  monthly_shop_details:
    class: MonthlyShopDetailsJob
    schedule: at 6pm on the 1st day of every month

  # Solid Queue クリーンアップ
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
