<!doctype html>
<html lang="ja">
  <head>
    <title>エラーが発生しました - ヨミスロ</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      body {
        background: #0a0a0b;
        color: #fafafa;
        display: grid;
        font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        place-items: center;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        padding: 2rem;
        text-align: center;
        max-width: 400px;
      }
      .code {
        font-size: 4rem;
        font-weight: 800;
        color: #27272a;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: #fafafa;
        letter-spacing: -0.05em;
      }
      p {
        font-size: 0.875rem;
        color: #71717a;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #10b981;
        color: #0a0a0b;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        padding: 0.625rem 1.5rem;
        border-radius: 0.375rem;
        transition: all 0.15s;
        min-height: 44px;
      }
      a:hover { background: #059669; }
      a:active { transform: scale(0.98); }
      @media (prefers-color-scheme: light) {
        body { background: #ffffff; color: #111827; }
        .code { color: #e5e7eb; }
        h1 { color: #111827; }
        p { color: #6b7280; }
        a { color: #ffffff; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">500</div>
      <h1>エラーが発生しました</h1>
      <p>申し訳ありません。サーバーで問題が発生しました。しばらくしてからもう一度お試しください。</p>
      <a href="/">トップページに戻る</a>
    </main>
  </body>
</html>
