<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Slot machine body -->
  <rect x="36" y="48" width="120" height="96" rx="12" fill="#f8fafc" opacity="0.95"/>
  <!-- Reel windows -->
  <rect x="48" y="62" width="28" height="40" rx="4" fill="#1e40af" opacity="0.15"/>
  <rect x="82" y="62" width="28" height="40" rx="4" fill="#1e40af" opacity="0.15"/>
  <rect x="116" y="62" width="28" height="40" rx="4" fill="#1e40af" opacity="0.15"/>
  <!-- 7 symbols -->
  <text x="62" y="91" font-family="Arial,sans-serif" font-weight="bold" font-size="28" fill="#ef4444" text-anchor="middle">7</text>
  <text x="96" y="91" font-family="Arial,sans-serif" font-weight="bold" font-size="28" fill="#ef4444" text-anchor="middle">7</text>
  <text x="130" y="91" font-family="Arial,sans-serif" font-weight="bold" font-size="28" fill="#ef4444" text-anchor="middle">7</text>
  <!-- Lever -->
  <rect x="162" y="68" width="6" height="36" rx="3" fill="#f59e0b"/>
  <circle cx="165" cy="64" r="7" fill="#f59e0b"/>
  <!-- Bottom panel -->
  <rect x="48" y="112" width="96" height="20" rx="4" fill="#1e40af" opacity="0.1"/>
  <!-- Buttons -->
  <circle cx="68" cy="122" r="6" fill="#10b981"/>
  <circle cx="96" cy="122" r="6" fill="#3b82f6"/>
  <circle cx="124" cy="122" r="6" fill="#f59e0b"/>
</svg>
