<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Slot machine body -->
  <rect x="80" y="100" width="352" height="280" rx="24" fill="#f8fafc" opacity="0.95"/>
  <!-- Reel windows -->
  <rect x="108" y="132" width="84" height="116" rx="8" fill="#1e40af" opacity="0.15"/>
  <rect x="214" y="132" width="84" height="116" rx="8" fill="#1e40af" opacity="0.15"/>
  <rect x="320" y="132" width="84" height="116" rx="8" fill="#1e40af" opacity="0.15"/>
  <!-- 7 symbols -->
  <text x="150" y="207" font-family="Arial,sans-serif" font-weight="bold" font-size="76" fill="#ef4444" text-anchor="middle">7</text>
  <text x="256" y="207" font-family="Arial,sans-serif" font-weight="bold" font-size="76" fill="#ef4444" text-anchor="middle">7</text>
  <text x="362" y="207" font-family="Arial,sans-serif" font-weight="bold" font-size="76" fill="#ef4444" text-anchor="middle">7</text>
  <!-- Lever -->
  <rect x="444" y="156" width="14" height="100" rx="7" fill="#f59e0b"/>
  <circle cx="451" cy="148" r="18" fill="#f59e0b"/>
  <!-- Bottom panel -->
  <rect x="108" y="272" width="296" height="80" rx="12" fill="#1e40af" opacity="0.1"/>
  <!-- Buttons -->
  <circle cx="168" cy="312" r="20" fill="#10b981"/>
  <circle cx="256" cy="312" r="20" fill="#3b82f6"/>
  <circle cx="344" cy="312" r="20" fill="#f59e0b"/>
  <!-- App name -->
  <text x="256" y="440" font-family="Arial,sans-serif" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">ヨミスロ</text>
</svg>
