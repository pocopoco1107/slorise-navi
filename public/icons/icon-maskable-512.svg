<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- Full background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Slot machine body (centered in safe zone ~80% area) -->
  <rect x="112" y="128" width="288" height="224" rx="20" fill="#f8fafc" opacity="0.95"/>
  <!-- Reel windows -->
  <rect x="134" y="156" width="68" height="92" rx="6" fill="#1e40af" opacity="0.15"/>
  <rect x="222" y="156" width="68" height="92" rx="6" fill="#1e40af" opacity="0.15"/>
  <rect x="310" y="156" width="68" height="92" rx="6" fill="#1e40af" opacity="0.15"/>
  <!-- 7 symbols -->
  <text x="168" y="218" font-family="Arial,sans-serif" font-weight="bold" font-size="60" fill="#ef4444" text-anchor="middle">7</text>
  <text x="256" y="218" font-family="Arial,sans-serif" font-weight="bold" font-size="60" fill="#ef4444" text-anchor="middle">7</text>
  <text x="344" y="218" font-family="Arial,sans-serif" font-weight="bold" font-size="60" fill="#ef4444" text-anchor="middle">7</text>
  <!-- Bottom panel -->
  <rect x="134" y="268" width="244" height="60" rx="8" fill="#1e40af" opacity="0.1"/>
  <!-- Buttons -->
  <circle cx="182" cy="298" r="14" fill="#10b981"/>
  <circle cx="256" cy="298" r="14" fill="#3b82f6"/>
  <circle cx="330" cy="298" r="14" fill="#f59e0b"/>
  <!-- App name -->
  <text x="256" y="404" font-family="Arial,sans-serif" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">ヨミスロ</text>
</svg>
