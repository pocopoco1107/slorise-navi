<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>オフライン | スロリセnavi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.5rem;
      color: #1e40af;
      margin-bottom: 0.5rem;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: #1e40af;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { background: #1e3a8a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F4F6;</div>
    <h1>オフラインです</h1>
    <p>インターネットに接続されていません。<br>接続を確認してもう一度お試しください。</p>
    <button onclick="location.reload()">再読み込み</button>
  </div>
</body>
</html>
