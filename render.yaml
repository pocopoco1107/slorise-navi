databases:
  - name: slorise-navi-db
    plan: free
    databaseName: slorise_navi_production
    user: slorise_navi

services:
  - type: web
    name: slorise-navi
    runtime: ruby
    plan: starter
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slorise-navi-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"
