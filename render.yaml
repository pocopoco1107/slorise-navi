databases:
  - name: yomislo-db
    plan: free
    databaseName: yomislo_production
    user: yomislo

services:
  - type: web
    name: yomislo
    runtime: ruby
    plan: starter
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yomislo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # ── 日次: DMMぱちタウン 機種+設置機種同期 ──
  # 03:00 JST (18:00 UTC前日) — 約5時間
  # ※毎月1日はスキップ (Job内判定、月次ジョブが代わりに実行)
  - type: cron
    name: yomislo-daily-refresh
    runtime: ruby
    plan: starter
    schedule: "0 18 * * *"
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec rails runner "DailyMachineRefreshJob.perform_now"
    envVars: &batch-env
      - key: DATABASE_URL
        fromDatabase:
          name: yomislo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"

  # ── 日次: 軽量集計バッチ ──────────
  # ランキング + 収支集計 + VoterProfile — 04:00 JST (19:00 UTC前日)
  - type: cron
    name: yomislo-daily-aggregation
    runtime: ruby
    plan: starter
    schedule: "0 19 * * *"
    buildCommand: ./bin/render-build.sh
    startCommand: >
      bundle exec rails runner "
        VoterRanking.refresh_weekly!;
        VoterRanking.refresh_monthly!;
        VoterRanking.refresh_all_time!;
        PlayRecordSummary.refresh_all!;
        Vote.where(voted_on: 7.days.ago..Date.current).select(:voter_token).distinct.pluck(:voter_token).each { |t| VoterProfile.refresh_for(t) }
      "
    envVars: *batch-env

  # ── 月次: DMMぱちタウン 店舗+機種+詳細+設置機種フル同期 ──
  # 毎月1日 03:00 JST (前月末日 18:00 UTC) — 約5時間
  - type: cron
    name: yomislo-monthly
    runtime: ruby
    plan: starter
    schedule: "0 18 1 * *"
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec rails runner "MonthlyShopDetailsJob.perform_now"
    envVars: *batch-env
