databases:
  - name: slorise-navi-db
    plan: free
    databaseName: slorise_navi_production
    user: slorise_navi

services:
  - type: web
    name: slorise-navi
    runtime: ruby
    plan: starter
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slorise-navi-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"

  # ── 定期バッチ (cron jobs) ──────────────────────────
  # 週次: 毎週日曜 AM3:00 JST (= 土曜 18:00 UTC)
  - type: cron
    name: slorise-navi-weekly
    runtime: ruby
    plan: starter
    schedule: "0 18 * * 6"
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec rake pworld:weekly_refresh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slorise-navi-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"

  # 月次: 毎月1日 AM2:00 JST (= 前月末日 17:00 UTC)
  - type: cron
    name: slorise-navi-monthly
    runtime: ruby
    plan: starter
    schedule: "0 17 1 * *"
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec rake pworld:monthly_refresh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slorise-navi-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
